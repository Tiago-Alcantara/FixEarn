  window.addEventListener('error', function(e) {

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const entryId = templateData.entry;

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const reader = ds.readable.getReader();

      // and tear down the wrapper. Non-# links navigate the parent to the

            'e.preventDefault();' +

              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +

            'else scrollTo({top:0, behavior:"smooth"});' +

      // ids) before wrapping — same escape level as every sibling JSON island.

      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

      }

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });

        return;

      var gen = ++navGen;
      frame.onload = function() {

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

                     document.getElementById('__bundler_placeholder');

        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);

    }

Fh2>\n            <p style=\"font-size:14.5px;color:#9A9DA1;margin:7px 0 0\">{{ servicesSub }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:inline-flex;border:1px solid #2A2D31;border-radius:999px;padding:3px;gap:2px;background:#16181B\">\n            <sc-for list=\"{{ tabs }}\" as=\"tab\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ tab.onClick }}\" style=\"{{ tab.style }}\">{{ tab.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:20px\">\n          <sc-for list=\"{{ services }}\" as=\"s\" hint-placeholder-count=\"8\">\n            <div class=\"svc\" style=\"{{ s.cardStyle }}\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between\">\n                <span style=\"width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#43464b,#1b1d21);border:1px solid #4a4d52;font-family:'Geist Mono',monospace;font-size:15px;font-weight:600;color:#D4D6D9\">{{ s.initial }}<\u002Fspan>\n                <sc-if value=\"{{ s.isActive }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"display:inline-flex;align-items:center;gap:6px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#D4D6D9;border:1px solid #4a4d52;border-radius:999px;padding:3px 9px\"><span style=\"width:5px;height:5px;border-radius:50%;background:#D4D6D9;box-shadow:0 0 6px rgba(212,214,217,.8)\"><\u002Fspan>{{ activeBadge }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:16px;font-weight:600;color:#F2F3F4;margin-top:16px\">{{ s.name }}<\u002Fdiv>\n              <div style=\"font-family:'Geist Mono',monospace;font-size:13px;color:#9A9DA1;margin-top:4px\">{{ s.costFmt }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:18px\">\n                <sc-if value=\"{{ s.unavailable }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:12px;color:#9A9DA1\">{{ needsMoreText }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ s.toggleLabelShown }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"font-size:13px;font-weight:500;color:{{ s.toggleTextColor }}\">{{ s.toggleText }}<\u002Fspan>\n                <\u002Fsc-if>\n                <button role=\"switch\" aria-checked=\"{{ s.isActive }}\" aria-label=\"{{ s.name }}\" disabled=\"{{ s.unavailable }}\" onclick=\"{{ s.onToggle }}\" style=\"{{ s.switchStyle }}\">\n                  <span style=\"{{ s.knobStyle }}\"><\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ s.unavailable }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ s.onIncrease }}\" style=\"margin-top:12px;background:none;border:none;padding:0;cursor:pointer;font-family:'Geist Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:#C0C2C5;text-decoration:underline;text-underline-offset:2px\" style-hover=\"color:#F2F3F4\">{{ increaseText }}<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:24px;align-items:center;background:#1A1C1F;border:1px solid #2A2D31;border-radius:20px;padding:26px;margin-top:6px\">\n        <div class=\"brushed\" style=\"position:relative;overflow:hidden;flex:0 0 auto;width:340px;max-width:100%;aspect-ratio:1.6;border-radius:18px;border:1px solid #4a4d52;box-shadow:0 24px 56px rgba(0,0,0,.55),0 2px 0 rgba(255,255,255,.1) inset;padding:24px;display:flex;flex-direction:column;justify-content:space-between\">\n          <span class=\"sweep\"><\u002Fspan>\n          <div style=\"position:relative;z-index:2;display:flex;align-items:flex-start;justify-content:space-between\">\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:11px;height:11px;background:linear-gradient(135deg,#E6E8EA,#9A9DA1);transform:rotate(45deg);border-radius:2px\"><\u002Fspan><span style=\"font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:.18em;color:#D4D6D9\">FIXEARN<\u002Fspan><\u002Fspan>\n            <span style=\"width:34px;height:25px;border-radius:5px;background:linear-gradient(135deg,#D4D6D9,#8d9094);box-shadow:0 1px 2px rgba(0,0,0,.45) inset\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position:relative;z-index:2;font-family:'Geist Mono',monospace;font-size:18px;letter-spacing:.18em;color:#EDEFF1;text-shadow:0 1px 0 rgba(0,0,0,.5)\">•••• •••• •••• 4291<\u002Fdiv>\n          <div style=\"position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:space-between\">\n            <span style=\"font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:.1em;color:#C0C2C5\">ACME LTDA.<\u002Fspan>\n            <span style=\"font-style:italic;font-weight:700;font-size:17px;color:#EDEFF1;letter-spacing:-.02em\">VISA<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 280px;min-width:240px\">\n          <p style=\"font-size:15px;line-height:1.6;color:#C8CACD;margin:0 0 16px\">{{ cardText }}<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:2px\">\n            <sc-for list=\"{{ paidServices }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #2A2D31\">\n                <span style=\"font-size:14px;color:#F2F3F4\">{{ p.name }}<\u002Fspan>\n                <span style=\"font-family:'Geist Mono',monospace;font-size:13px;color:#9A9DA1\">{{ p.costFmt }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button style=\"margin-top:18px;font-family:inherit;font-size:14px;font-weight:500;color:#F2F3F4;background:rgba(255,255,255,.03);border:1px solid #3A3D41;border-radius:10px;padding:11px 20px;cursor:pointer;transition:all .25s ease\" style-hover=\"border-color:#C0C2C5;background:rgba(192,194,197,.06)\">{{ cardSettings }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    lang: 'en',\n    nav: 'overview',\n    tab: 'all',\n    deposit: 5000,\n    active: { openai: true, notion: true, slack: true },\n  };\n\n  MONTHLY = 142.5;\n\n  SERVICES = [\n    { id: 'openai', name: 'OpenAI', initial: 'AI', cost: 49.9, cat: 'ai' },\n    { id: 'claude', name: 'Anthropic Claude', initial: 'AC', cost: 99.0, cat: 'ai' },\n    { id: 'midjourney', name: 'Midjourney', initial: 'MJ', cost: 59.0, cat: 'ai' },\n    { id: 'notion', name: 'Notion', initial: 'N', cost: 24.9, cat: 'productivity' },\n    { id: 'slack', name: 'Slack', initial: 'SL', cost: 9.5, cat: 'productivity' },\n    { id: 'figma', name: 'Figma', initial: 'Fi', cost: 39.9, cat: 'productivity' },\n    { id: 'github', name: 'GitHub', initial: 'GH', cost: 21.0, cat: 'dev' },\n    { id: 'linear', name: 'Linear', initial: 'Li', cost: 16.0, cat: 'dev' },\n  ];\n\n  fmt(n) {\n    return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n  }\n\n  setLang(l) { if (l !== this.state.lang) this.setState({ lang: l }); }\n\n  toggleService(id) {\n    const s = this.SERVICES.find((x) => x.id === id);\n    const active = { ...this.state.active };\n    if (active[id]) { delete active[id]; this.setState({ active }); return; }\n    const committed = this.committed(this.state.active);\n    if (s.cost <= this.MONTHLY - committed) { active[id] = true; this.setState({ active }); }\n  }\n\n  committed(active) {\n    return this.SERVICES.reduce((sum, s) => sum + (active[s.id] ? s.cost : 0), 0);\n  }\n\n  icon(name) {\n    const R = React.createElement;\n    const S = (ch) => R('svg', { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.6, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': 'true' }, ch);\n    const P = (d, k) => R('path', { d, key: k || d });\n    const Rt = (x, y, w, h, k) => R('rect', { x, y, width: w, height: h, rx: 2, key: k });\n    const map = {\n      overview: S([Rt(3.5, 3.5, 7, 7, 'a'), Rt(13.5, 3.5, 7, 7, 'b'), Rt(3.5, 13.5, 7, 7, 'c'), Rt(13.5, 13.5, 7, 7, 'd')]),\n      deposit: S([P('M12 3v10', 'a'), P('M8 9l4 4 4-4', 'b'), P('M4 19h16', 'c')]),\n      services: S([R('circle', { cx: 7, cy: 7, r: 3.2, key: 'a' }), R('circle', { cx: 17, cy: 7, r: 3.2, key: 'b' }), R('circle', { cx: 7, cy: 17, r: 3.2, key: 'c' }), R('circle', { cx: 17, cy: 17, r: 3.2, key: 'd' })]),\n      card: S([Rt(3, 5.5, 18, 13, 'a'), P('M3 9.5h18', 'b')]),\n      transactions: S([P('M5 7h14', 'a'), P('M5 12h14', 'b'), P('M5 17h9', 'c')]),\n      settings: S([R('circle', { cx: 12, cy: 12, r: 3.2, key: 'a' }), P('M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1', 'b')]),\n      business: S([Rt(5, 4, 14, 16, 'a'), P('M9 9h2M13 9h2M9 13h2M13 13h2M10 20v-3h4v3', 'b')]),\n      taxid: S([Rt(3, 6, 18, 12, 'a'), P('M7 10.5h4M7 14h8', 'b')]),\n      bank: S([P('M4 10h16', 'a'), P('M5 10l7-4.5 7 4.5', 'b'), P('M6.5 10v7M10 10v7M14 10v7M17.5 10v7', 'c'), P('M4 20h16', 'd')]),\n    };\n    return map[name];\n  }\n\n  renderVals() {\n    const T = {\n      en: {\n        nav: { overview: 'Overview', deposit: 'My deposit', services: 'Services', card: 'Virtual card', transactions: 'Transactions', settings: 'Settings' },\n        logout: 'Log out',\n        greeting: 'Welcome back, Acme', greetingSub: 'Your capital is working. Returns are covering your tools.',\n        summary: [\n          { title: 'Your deposit', value: this.fmt(15000), label: 'Total capital', sub: 'Your money, always', silver: false },\n          { title: 'Monthly returns', value: this.fmt(this.MONTHLY), label: 'Generated this month', sub: '▲ +3.2% vs last month', silver: true },\n          { title: 'Available to spend', value: null, label: 'After active subscriptions', sub: 'Unused returns are reinvested', silver: false },\n        ],\n        barTitle: 'Your returns at a glance', usage: (p) => \"You're using \" + p + '% of your monthly returns',\n        committedLabel: 'Committed', availableLabel: 'Available', totalLabel: 'Total monthly return',\n        depositTitle: 'Add to your deposit', depositSub: 'More capital means more returns to cover your tools.',\n        estReturn: (v) => 'Estimated extra return: ~' + this.fmt(v) + '/month', depositCta: 'Deposit via PIX',\n        depositSecurity: 'Secure transfer · Funds invested automatically',\n        servicesTitle: 'Available services', servicesSub: 'Activate the tools your returns can cover.',\n        tabs: { all: 'All', ai: 'AI tools', productivity: 'Productivity', dev: 'Dev' },\n        activeBadge: 'Active', needsMore: 'Needs more capital', increase: 'Increase deposit',\n        on: 'On', activate: 'Activate',\n        cardText: 'This card pays for your active subscriptions automatically, funded by your returns.',\n        cardSettings: 'Card settings',\n        actTitle: 'Activate your account',\n        actSub: \"You're almost there. Complete the remaining 3 tasks to activate your account.\",\n        actDone: 'Submitted', actAction: 'Requires action',\n        tasks: [\n          ['business', 'Business details', 'done', null],\n          ['taxid', 'Tax ID', 'done', null],\n          ['bank', 'Bank connection', 'done', null],\n          ['deposit', 'Make your first deposit', 'action', 'deposit'],\n          ['services', 'Choose your tools', 'action', 'services'],\n          ['card', 'Activate virtual card', 'action', 'card'],\n        ],\n      },\n      pt: {\n        nav: { overview: 'Visão geral', deposit: 'Meu aporte', services: 'Serviços', card: 'Cartão virtual', transactions: 'Transações', settings: 'Configurações' },\n        logout: 'Sair',\n        greeting: 'Bem-vindo, Acme', greetingSub: 'Seu capital está rendendo. O rendimento cobre suas ferramentas.',\n        summary: [\n          { title: 'Seu aporte', value: this.fmt(15000), label: 'Capital total', sub: 'Sempre seu', silver: false },\n          { title: 'Rendimento mensal', value: this.fmt(this.MONTHLY), label: 'Gerado este mês', sub: '▲ +3,2% vs mês anterior', silver: true },\n          { title: 'Disponível para usar', value: null, label: 'Após assinaturas ativas', sub: 'A sobra é reinvestida', silver: false },\n        ],\n        barTitle: 'Seu rendimento de relance', usage: (p) => 'Você está usando ' + p + '% do seu rendimento mensal',\n        committedLabel: 'Comprometido', availableLabel: 'Disponível', totalLabel: 'Rendimento mensal total',\n        depositTitle: 'Aumentar seu aporte', depositSub: 'Mais capital significa mais rendimento para cobrir suas ferramentas.',\n        estReturn: (v) => 'Rendimento extra estimado: ~' + this.fmt(v) + '/mês', depositCta: 'Aportar via PIX',\n        depositSecurity: 'Transferência segura · Capital investido automaticamente',\n        servicesTitle: 'Serviços disponíveis', servicesSub: 'Ative as ferramentas que seu rendimento pode pagar.',\n        tabs: { all: 'Todos', ai: 'IA', productivity: 'Produtividade', dev: 'Dev' },\n        activeBadge: 'Ativo', needsMore: 'Requer mais capital', increase: 'Aumentar aporte',\n        on: 'Ativo', activate: 'Ativar',\n        cardText: 'Este cartão paga suas assinaturas ativas automaticamente, com o seu rendimento.',\n        cardSettings: 'Configurações do cartão',\n        actTitle: 'Ative sua conta',\n        actSub: 'Você está quase lá. Conclua as 3 tarefas restantes para ativar sua conta.',\n        actDone: 'Enviado', actAction: 'Requer ação',\n        tasks: [\n          ['business', 'Dados da empresa', 'done', null],\n          ['taxid', 'CNPJ', 'done', null],\n          ['bank', 'Conexão bancária', 'done', null],\n          ['deposit', 'Faça seu primeiro aporte', 'action', 'deposit'],\n          ['services', 'Escolha suas ferramentas', 'action', 'services'],\n          ['card', 'Ative o cartão virtual', 'action', 'card'],\n        ],\n      },\n    };\n\n    const t = T[this.state.lang];\n    const isEn = this.state.lang === 'en';\n    const committed = this.committed(this.state.active);\n    const available = this.MONTHLY - committed;\n    const pct = Math.round((committed / this.MONTHLY) * 100);\n\n    const actDoneCount = t.tasks.filter((x) => x[2] === 'done').length;\n    const actPct = Math.round((actDoneCount / t.tasks.length) * 100);\n    const activationTasks = t.tasks.map(([ic, title, st, route]) => ({\n      icon: this.icon(ic), title,\n      status: st === 'done' ? t.actDone : t.actAction,\n      statusStyle: { display: 'block', fontFamily: \"'Geist Mono', monospace\", fontSize: '12px', marginTop: '3px', color: st === 'done' ? '#9A9DA1' : '#C2A06A' },\n      rowStyle: { display: 'flex', alignItems: 'center', gap: '14px', width: '100%', textAlign: 'left', border: 'none', borderBottom: '1px solid #2A2D31', background: 'transparent', cursor: 'pointer', padding: '13px 14px', borderRadius: '10px', fontFamily: 'inherit' },\n      onClick: route ? (() => this.setState({ nav: route })) : (() => {}),\n    }));\n\n    const navOrder = ['overview', 'deposit', 'services', 'card', 'transactions', 'settings'];\n    const navItems = navOrder.map((id) => {\n      const on = this.state.nav === id;\n      return {\n        id, label: t.nav[id], icon: this.icon(id),\n        onClick: () => this.setState({ nav: id }),\n        iconColor: on ? '#F2F3F4' : '#9A9DA1',\n        barColor: on ? '#C0C2C5' : 'transparent',\n        style: { position: 'relative', display: 'flex', alignItems: 'center', gap: '12px', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer', borderRadius: '10px', padding: '11px 12px', fontFamily: 'inherit', fontSize: '14.5px', fontWeight: on ? 600 : 500, color: on ? '#F2F3F4' : '#9A9DA1', background: on ? '#1f2226' : 'transparent' },\n      };\n    });\n\n    const summary = t.summary.map((c) => ({\n      title: c.title,\n      value: c.value === null ? this.fmt(available) : c.value,\n      valueColor: c.silver ? '#C0C2C5' : '#F2F3F4',\n      label: c.label, sub: c.sub,\n    }));\n\n    const quickDefs = [5000, 10000, 20000];\n    const quickAmounts = quickDefs.map((a) => {\n      const on = this.state.deposit === a;\n      return {\n        label: '+' + this.fmt(a).replace(',00', '').replace('R$\\u00a0', 'R$ '),\n        onClick: () => this.setState({ deposit: a }),\n        style: { fontFamily: \"'Geist Mono', monospace\", fontSize: '13px', cursor: 'pointer', borderRadius: '999px', padding: '9px 15px', border: '1px solid ' + (on ? '#C0C2C5' : '#2A2D31'), background: on ? 'rgba(192,194,197,.08)' : '#16181B', color: on ? '#F2F3F4' : '#9A9DA1', transition: 'all .2s ease' },\n      };\n    });\n    const estExtra = this.state.deposit * (this.MONTHLY / 15000);\n\n    const tabOrder = ['all', 'ai', 'productivity', 'dev'];\n    const tabs = tabOrder.map((id) => {\n      const on = this.state.tab === id;\n      return {\n        label: t.tabs[id], onClick: () => this.setState({ tab: id }),\n        style: { border: 'none', borderRadius: '999px', padding: '7px 14px', fontSize: '13px', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', background: on ? '#2E3136' : 'transparent', color: on ? '#F2F3F4' : '#9A9DA1', transition: 'all .2s ease' },\n      };\n    });\n\n    const visible = this.SERVICES.filter((s) => this.state.tab === 'all' || s.cat === this.state.tab);\n    const services = visible.map((s) => {\n      const isActive = !!this.state.active[s.id];\n      const fits = s.cost <= available;\n      const unavailable = !isActive && !fits;\n      const cardStyle = {\n        position: 'relative', background: '#1A1C1F', borderRadius: '16px', padding: '22px',\n        border: '1px solid ' + (isActive ? '#6a6d72' : '#2A2D31'),\n        boxShadow: isActive ? '0 0 0 1px rgba(192,194,197,.25), 0 14px 34px rgba(0,0,0,.35)' : 'none',\n        opacity: unavailable ? 0.5 : 1,\n      };\n      const switchStyle = {\n        width: '42px', height: '24px', borderRadius: '999px', position: 'relative', flexShrink: 0,\n        border: '1px solid ' + (isActive ? 'transparent' : '#3a3d42'),\n        background: isActive ? 'linear-gradient(180deg,#E6E8EA,#A8AAAD)' : '#16181B',\n        cursor: unavailable ? 'not-allowed' : 'pointer', transition: 'background .25s ease, border-color .25s ease', padding: 0,\n      };\n      const knobStyle = {\n        position: 'absolute', top: '2px', left: isActive ? '20px' : '2px', width: '18px', height: '18px',\n        borderRadius: '50%', background: isActive ? '#0E0F11' : '#9A9DA1', transition: 'left .25s ease',\n      };\n      return {\n        id: s.id, name: s.name, initial: s.initial, costFmt: this.fmt(s.cost) + (isEn ? '/mo' : '/mês'),\n        isActive, unavailable, cardStyle, switchStyle, knobStyle,\n        toggleLabelShown: !unavailable, toggleText: isActive ? t.on : t.activate,\n        toggleTextColor: isActive ? '#C0C2C5' : '#9A9DA1',\n        onToggle: () => this.toggleService(s.id),\n        onIncrease: () => this.setState({ nav: 'deposit' }),\n      };\n    });\n\n    const paidServices = this.SERVICES.filter((s) => this.state.active[s.id]).map((s) => ({ name: s.name, costFmt: this.fmt(s.cost) }));\n\n    const tabBase = { border: 'none', borderRadius: '999px', padding: '5px 12px', fontSize: '12.5px', fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', letterSpacing: '.03em' };\n\n    return {\n      navItems, logoutLabel: t.logout,\n      onLogout: () => { if (this.authEl) this.authEl.
