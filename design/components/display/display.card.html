<!-- @dsCard group="Components" viewport="700x340" subtitle="Section heading, stat tiles, progress, subscription rows" name="Display" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:26px;display:flex;flex-direction:column;gap:22px}
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.list{max-width:360px}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
function findNs(name){for(const k of Object.keys(window)){const v=window[k];if(v&&typeof v==='object'&&typeof v[name]!=='undefined')return v;}return window;}
const NS = findNs('StatTile');
const { SectionHeading, StatTile, ProgressBar, SubscriptionRow, Divider } = NS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <SectionHeading align="left" kicker="01 — 02 — 03" title="How it works" lead="Three simple steps to put your capital to work." />
    <div className="tiles">
      <StatTile label="Capital" value="$18,400" />
      <StatTile label="Returns / mo" value="$214.80" sub="▲ +8.4% / yr" />
      <StatTile label="Covered" value="7 tools" />
    </div>
    <ProgressBar label="Subscriptions covered" value={86} />
    <div className="list">
      <SubscriptionRow name="OpenAI" price="$20.00" />
      <Divider />
      <SubscriptionRow name="Notion" price="$16.00" />
      <Divider />
      <SubscriptionRow name="Linear" price="$8.00" paid={false} />
    </div>
  </>
);
</script>
</body></html>
