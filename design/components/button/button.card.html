<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;display:flex;flex-direction:column;gap:18px}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
function findNs(name){for(const k of Object.keys(window)){const v=window[k];if(v&&typeof v==='object'&&typeof v[name]!=='undefined')return v;}return window;}
const { Button } = findNs('Button');
ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <div className="row">
      <Button variant="primary">Get started</Button>
      <Button variant="secondary" as="a" href="#">See how it works</Button>
      <Button variant="ghost">Log in</Button>
    </div>
    <div className="row">
      <Button size="sm">Small</Button>
      <Button size="md">Medium</Button>
      <Button size="lg">Large</Button>
    </div>
  </>
);
</script>
</body></html>
