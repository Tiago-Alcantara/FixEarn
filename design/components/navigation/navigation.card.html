<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:0}.pad{padding:22px 0}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
function findNs(name){for(const k of Object.keys(window)){const v=window[k];if(v&&typeof v==='object'&&typeof v[name]!=='undefined')return v;}return window;}
const NS = findNs('Header');
const { Header, Marquee, Footer } = NS;
const { useState } = React;
function Demo(){
  const [lang,setLang]=useState('en');
  return (<>
    <Header nav={['How it works','Services','Why Yield2Pay']} lang={lang} onLang={setLang} />
    <div className="pad"><Marquee items={['OpenAI','Anthropic','Notion','Figma','GitHub','Linear','Slack']} /></div>
    <Footer columns={[
      {title:'Product',links:['How it works','Services','Security']},
      {title:'Company',links:['About','Contact','Careers']},
      {title:'Legal',links:['Terms','Privacy']},
    ]} />
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
