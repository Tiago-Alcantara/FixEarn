<!-- @dsCard group="Components" viewport="700x260" subtitle="Brushed surface — hover sweep (left) and looping sweep (right)" name="MetalCard" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:26px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
h3{font-family:var(--fx-font-display);font-size:19px;font-weight:600;color:var(--fx-text);margin:18px 0 0}
p{font-size:14px;color:var(--fx-text-2);margin:8px 0 0;line-height:1.5}
.num{font-family:var(--fx-font-mono);font-size:32px;color:var(--fx-silver-bright)}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
function findNs(name){for(const k of Object.keys(window)){const v=window[k];if(v&&typeof v==='object'&&typeof v[name]!=='undefined')return v;}return window;}
const { MetalCard } = findNs('MetalCard');
ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <MetalCard sweep="hover">
      <span className="num">01</span>
      <h3>Make your deposit</h3>
      <p>Hover me — the light sweeps across once.</p>
    </MetalCard>
    <MetalCard sweep="loop">
      <span className="num">02</span>
      <h3>Capital at work</h3>
      <p>Continuous sweep, for hero & CTA panels.</p>
    </MetalCard>
  </>
);
</script>
</body></html>
