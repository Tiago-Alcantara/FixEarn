<!-- @dsCard group="Colors" viewport="700x210" subtitle="The signature brushed-metal surface: gradient + grain + edge" name="Brushed metal" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:20px;font-family:var(--fx-font-mono)}
.panel{position:relative;height:150px;border-radius:var(--fx-radius-2xl);border:1px solid var(--fx-border-metal);background:var(--fx-metal);box-shadow:var(--fx-elev-hero);overflow:hidden}
.panel::after{content:"";position:absolute;inset:0;background:var(--fx-metal-grain);opacity:.5}
.tag{position:absolute;left:18px;bottom:14px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--fx-silver-bright)}</style>
</head><body>
<div class="panel"><div class="tag">--fx-metal · --fx-metal-grain · --fx-border-metal</div></div>
</body></html>
