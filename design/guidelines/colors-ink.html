<!-- @dsCard group="Colors" viewport="700x168" subtitle="Near-black ink and raised surfaces" name="Ink & surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:20px;font-family:var(--fx-font-mono)}.row{display:flex;gap:14px;flex-wrap:wrap}.sw{flex:1;min-width:120px}.chip{height:74px;border-radius:var(--fx-radius-lg);border:1px solid var(--fx-border)}.lbl{font-size:11px;color:var(--fx-text-2);margin-top:9px}.hex{font-size:12px;color:var(--fx-text);margin-top:2px}</style>
</head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--fx-bg)"></div><div class="lbl">--fx-bg</div><div class="hex">#0c0d0f</div></div>
  <div class="sw"><div class="chip" style="background:var(--fx-surface-1)"></div><div class="lbl">--fx-surface-1</div><div class="hex">#131417</div></div>
  <div class="sw"><div class="chip" style="background:var(--fx-surface-2)"></div><div class="lbl">--fx-surface-2</div><div class="hex">#16181b</div></div>
  <div class="sw"><div class="chip" style="background:var(--fx-surface-3)"></div><div class="lbl">--fx-surface-3</div><div class="hex">#1b1d21</div></div>
</div>
</body></html>
