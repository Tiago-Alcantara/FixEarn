<!-- @dsCard group="Type" viewport="700x230" subtitle="The full type scale, large to small" name="Type scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:20px;font-family:var(--fx-font-display)}
.line{display:flex;align-items:baseline;gap:14px;padding:4px 0}
.s{color:var(--fx-text)}.m{font-family:var(--fx-font-mono);font-size:10.5px;color:var(--fx-text-3);margin-left:auto}</style>
</head><body>
<div class="line"><span class="s" style="font-size:40px;font-weight:700;letter-spacing:-.025em">Hero</span><span class="m">--fx-text-hero</span></div>
<div class="line"><span class="s" style="font-size:30px;font-weight:600;letter-spacing:-.02em">Section title</span><span class="m">--fx-text-h2</span></div>
<div class="line"><span class="s" style="font-size:20px;font-weight:600">Card title</span><span class="m">--fx-text-h3</span></div>
<div class="line"><span class="s" style="font-size:18px;color:var(--fx-text-2)">Lead / subtitle</span><span class="m">--fx-text-lg</span></div>
<div class="line"><span class="s" style="font-size:15px;color:var(--fx-text-2)">Body copy</span><span class="m">--fx-text-sm</span></div>
</body></html>
