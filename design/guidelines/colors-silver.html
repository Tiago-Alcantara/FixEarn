<!-- @dsCard group="Colors" viewport="700x168" subtitle="Polished silver accents and chrome button fill" name="Silver & chrome" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:20px;font-family:var(--fx-font-mono)}.row{display:flex;gap:14px;flex-wrap:wrap}.sw{flex:1;min-width:130px}.chip{height:74px;border-radius:var(--fx-radius-lg);border:1px solid var(--fx-border-metal)}.lbl{font-size:11px;color:var(--fx-text-2);margin-top:9px}.hex{font-size:12px;color:var(--fx-text);margin-top:2px}</style>
</head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--fx-silver)"></div><div class="lbl">--fx-silver</div><div class="hex">#C0C2C5</div></div>
  <div class="sw"><div class="chip" style="background:var(--fx-silver-bright)"></div><div class="lbl">--fx-silver-bright</div><div class="hex">#D4D6D9</div></div>
  <div class="sw"><div class="chip" style="background:var(--fx-chrome)"></div><div class="lbl">--fx-chrome</div><div class="hex">#E6E8EA → #A8AAAD</div></div>
</div>
</body></html>
