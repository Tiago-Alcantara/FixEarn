<!-- @dsCard group="Spacing" viewport="700x200" subtitle="Corner radii from engraved chips to large panels" name="Corner radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:22px;font-family:var(--fx-font-mono)}.row{display:flex;gap:16px;flex-wrap:wrap}
.col{text-align:center}
.box{width:96px;height:74px;background:var(--fx-metal);border:1px solid var(--fx-border-metal)}
.l{font-size:10.5px;color:var(--fx-text-2);margin-top:8px}</style>
</head><body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:var(--fx-radius-md)"></div><div class="l">md · 12</div></div>
  <div class="col"><div class="box" style="border-radius:var(--fx-radius-lg)"></div><div class="l">lg · 14</div></div>
  <div class="col"><div class="box" style="border-radius:var(--fx-radius-xl)"></div><div class="l">xl · 18</div></div>
  <div class="col"><div class="box" style="border-radius:var(--fx-radius-2xl)"></div><div class="l">2xl · 22</div></div>
  <div class="col"><div class="box" style="border-radius:var(--fx-radius-3xl)"></div><div class="l">3xl · 26</div></div>
  <div class="col"><div class="box" style="border-radius:var(--fx-radius-pill)"></div><div class="l">pill · 999</div></div>
</div>
</body></html>
