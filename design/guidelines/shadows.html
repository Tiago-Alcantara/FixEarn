<!-- @dsCard group="Brand" viewport="700x210" subtitle="Deep soft drop shadows paired with a 1px inner edge-highlight" name="Elevation" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:26px;font-family:var(--fx-font-mono)}.row{display:flex;gap:28px;flex-wrap:wrap}
.col{text-align:center}
.box{width:150px;height:96px;border-radius:var(--fx-radius-xl);background:var(--fx-metal);border:1px solid var(--fx-border-metal)}
.l{font-size:10.5px;color:var(--fx-text-2);margin-top:12px}</style>
</head><body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--fx-shadow-card)"></div><div class="l">card</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--fx-shadow-panel)"></div><div class="l">panel</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--fx-elev-hero)"></div><div class="l">hero + inner edge</div></div>
</div>
</body></html>
