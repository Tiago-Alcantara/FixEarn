<!-- @dsCard group="Colors" viewport="700x182" subtitle="Text hierarchy on dark, from primary to disabled" name="Text colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:22px;font-family:var(--fx-font-display)}
.line{display:flex;align-items:baseline;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--fx-border-faint)}
.t{font-size:18px}.m{font-family:var(--fx-font-mono);font-size:11px;color:var(--fx-text-3)}</style>
</head><body>
<div class="line"><span class="t" style="color:var(--fx-text)">Primary text</span><span class="m">--fx-text · #EDEFF1</span></div>
<div class="line"><span class="t" style="color:var(--fx-text-strong)">Strong / numeric</span><span class="m">--fx-text-strong · #F2F3F4</span></div>
<div class="line"><span class="t" style="color:var(--fx-text-2)">Secondary / body</span><span class="m">--fx-text-2 · #9A9DA1</span></div>
<div class="line"><span class="t" style="color:var(--fx-text-3)">Tertiary label</span><span class="m">--fx-text-3 · #8a8d91</span></div>
<div class="line" style="border:none"><span class="t" style="color:var(--fx-text-disabled)">Disabled</span><span class="m">--fx-text-disabled · #5F6266</span></div>
</body></html>
