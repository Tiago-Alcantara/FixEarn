<!-- @dsCard group="Spacing" viewport="700x180" subtitle="4px base grid, from 4 to 96px" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{padding:22px;font-family:var(--fx-font-mono)}
.row{display:flex;align-items:flex-end;gap:12px;height:96px}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{width:26px;background:var(--fx-metal);border:1px solid var(--fx-border-metal);border-radius:4px}
.l{font-size:10px;color:var(--fx-text-3)}</style>
</head><body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px"></div><div class="l">1</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="l">2</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="l">3</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="l">4</div></div>
  <div class="col"><div class="bar" style="height:20px"></div><div class="l">5</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="l">6</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="l">8</div></div>
  <div class="col"><div class="bar" style="height:40px"></div><div class="l">10</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="l">12</div></div>
  <div class="col"><div class="bar" style="height:72px"></div><div class="l">18</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="l">24</div></div>
</div>
</body></html>
